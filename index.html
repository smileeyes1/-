<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مغامرة السوق الجميل</title>
  <style>
    body {
      font-family: Arial, Tahoma, sans-serif;
      background: linear-gradient(to bottom, #fffdd0, #ffe4b5);
      text-align: center;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    .container {
      max-width: 720px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }
    h1 { color: #c85a17; font-size: 42px; margin-bottom: 10px; }
    #character { font-size: 32px; margin: 20px 0; color: #2e8b57; }
    #money-box {
      font-size: 34px;
      background: #ffd700;
      padding: 18px;
      border-radius: 18px;
      margin: 25px auto;
      width: fit-content;
      font-weight: bold;
    }
    #question { font-size: 28px; margin: 35px 0; min-height: 70px; line-height: 1.4; }
    #items {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 25px 0;
    }
    .item { text-align: center; font-size: 22px; }
    .item img { width: 140px; height: 140px; object-fit: contain; }
    input {
      font-size: 32px;
      width: 160px;
      padding: 12px;
      margin: 20px 10px;
      text-align: center;
      border: 2px solid #4682b4;
      border-radius: 12px;
    }
    button {
      font-size: 26px;
      padding: 16px 40px;
      margin: 12px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
    }
    #checkBtn { background: #32cd32; }
    #checkBtn:hover { background: #228b22; }
    #nextBtn { background: #1e90ff; display: none; }
    #nextBtn:hover { background: #1873d1; }
    #result { font-size: 30px; font-weight: bold; margin: 25px 0; min-height: 50px; }
    .green { color: #006400; }
    .red { color: #8b0000; }
  </style>
</head>
<body>

  <div class="container">
    <h1>مغامرة السوق الجميل</h1>
    <div id="character">يا بطل ساعدني نشتري اغراض الحلوة 🛒🍎</div>
    
    <div id="money-box">
      فلوسي: <span id="moneyDisplay">٥٠</span> قرش
    </div>

    <div id="question"></div>
    <div id="items"></div>

    <input type="number" id="answer" placeholder="اكتب الجواب" min="0">
    <br>
    <button id="checkBtn" onclick="checkAnswer()">تأكيد</button>
    <button id="nextBtn" onclick="nextQuestion()">السؤال التالي →</button>

    <div id="result"></div>
  </div>

  <script>
    let money = 50;
    let currentAnswer = 0;

    function toArabicNum(num) {
      const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
      return num.toString().split('').map(d => arabicDigits[parseInt(d)]).join('');
    }

    const itemsData = [
      {name: "موز",     price: 12, img: "https://cdn.splashmath.com/curriculum_uploads/images/playables/picture_perfect_fruits_banana.png"},
      {name: "تفاح",    price: 15, img: "https://thumbs.dreamstime.com/b/cut-glue-red-apple-vector-illustration-paper-game-applique-children-s-creativity-activity-learning-out-262690193.jpg"},
      {name: "برتقال",  price: 10, img: "https://thumbs.dreamstime.com/b/cartoon-fruits-funny-drawn-tangerine-contour-lines-isolated-transparent-background-simple-clip-art-printable-coloring-332424472.jpg"},
      {name: "حلوى",    price: 8,  img: "https://thumbs.dreamstime.com/b/how-many-sweets-counting-cartoon-game-illustration-educational-children-candy-100711428.jpg"},
      {name: "كرة",     price: 25, img: "https://m.media-amazon.com/images/I/6117wwdUSsL._AC_UF1000,1000_QL80_.jpg"}
    ];

    function updateMoneyDisplay() {
      document.getElementById("moneyDisplay").innerText = toArabicNum(money);
    }

    function generateQuestion() {
      document.getElementById("result").innerText = "";
      document.getElementById("result").className = "";
      document.getElementById("answer").value = "";
      document.getElementById("nextBtn").style.display = "none";

      let idx1 = Math.floor(Math.random() * itemsData.length);
      let idx2 = Math.floor(Math.random() * itemsData.length);
      while (idx2 === idx1) idx2 = Math.floor(Math.random() * itemsData.length);

      let item1 = itemsData[idx1];
      let item2 = itemsData[idx2];

      currentAnswer = item1.price + item2.price;

      document.getElementById("question").innerHTML = 
        `اشتريت ${item1.name} بـ ${toArabicNum(item1.price)} قرش<br>` +
        `و ${item2.name} بـ ${toArabicNum(item2.price)} قرش<br>` +
        `كم تدفع للبائع؟`;

      let itemsDiv = document.getElementById("items");
      itemsDiv.innerHTML = "";

      let div1 = document.createElement("div");
      div1.className = "item";
      div1.innerHTML = `<img src="\( {item1.img}"><br> \){item1.name} ${toArabicNum(item1.price)}`;
      itemsDiv.appendChild(div1);

      let div2 = document.createElement("div");
      div2.className = "item";
      div2.innerHTML = `<img src="\( {item2.img}"><br> \){item2.name} ${toArabicNum(item2.price)}`;
      itemsDiv.appendChild(div2);
    }

    function checkAnswer() {
      let userInput = document.getElementById("answer").value.trim();
      let userAnswer = parseInt(userInput);

      if (userInput === "" || isNaN(userAnswer)) {
        document.getElementById("result").innerText = "اكتب رقم يا بطل";
        document.getElementById("result").className = "red";
        return;
      }

      if (userAnswer === currentAnswer) {
        document.getElementById("result").innerText = "صحيح بارك الله فيك يا بطل 🎉";
        document.getElementById("result").className = "green";

        money -= currentAnswer;
        if (money < 0) money = 0;
        updateMoneyDisplay();

        if (money <= 0) {
          document.getElementById("question").innerHTML = "مبروك يا بطل خلصت الفلوس وحصلت على جائزة كبيرة 🎁🍦";
          document.getElementById("answer").style.display = "none";
          document.getElementById("checkBtn").style.display = "none";
          document.getElementById("nextBtn").style.display = "none";
        } else {
          document.getElementById("nextBtn").style.display = "inline-block";
        }
      } else {
        document.getElementById("result").innerText = "حاول مرة ثانية يا بطل 💪";
        document.getElementById("result").className = "red";
      }
    }

    function nextQuestion() {
      if (money > 0) generateQuestion();
    }

    updateMoneyDisplay();
    generateQuestion();
  </script>

</body>
</html>
